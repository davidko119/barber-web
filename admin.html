<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DON Admin</title>
  <!-- Žiadny odkaz na túto stránku z hlavného webu -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ── Login Screen ─────────────────────────── -->
  <div class="admin-login" id="adminLogin">
    <div class="login-card">
      <div class="login-logo">D<span>O</span>N</div>
      <p class="login-sub">Admin Panel</p>
      <form class="login-form" id="loginForm">
        <div class="login-field">
          <input
            type="password"
            id="adminPassword"
            placeholder="Heslo"
            autocomplete="current-password"
            required
          />
        </div>
        <div class="login-error" id="loginError">Nesprávne heslo</div>
        <button type="submit" class="login-btn">Prihlásiť sa</button>
      </form>
    </div>
  </div>

  <!-- ── Admin Dashboard ──────────────────────── -->
  <div class="admin-dashboard hidden" id="adminDashboard">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">D<span>O</span>N</div>
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" data-view="bookings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Rezervácie
        </a>
        <a href="#" class="sidebar-link" data-view="stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Štatistiky
        </a>
      </nav>
      <button class="sidebar-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Odhlásiť
      </button>
    </aside>

    <!-- Main content -->
    <main class="admin-main">

      <!-- Header -->
      <header class="admin-header">
        <h1 class="admin-title">Rezervácie</h1>
        <div class="admin-header-right">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">Načítavam…</span>
          <button class="refresh-btn" id="refreshBtn" title="Obnoviť">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </header>

      <!-- Filters -->
      <div class="admin-filters">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-status="all">Všetky <span class="tab-count" id="countAll">0</span></button>
          <button class="filter-tab" data-status="pending">Čakajúce <span class="tab-count" id="countPending">0</span></button>
          <button class="filter-tab" data-status="confirmed">Potvrdené <span class="tab-count" id="countConfirmed">0</span></button>
          <button class="filter-tab" data-status="cancelled">Zrušené <span class="tab-count" id="countCancelled">0</span></button>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="Hľadať podľa mena alebo emailu…" />
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table class="bookings-table" id="bookingsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Meno</th>
              <th>Email</th>
              <th>Telefón</th>
              <th>Služba</th>
              <th>Dátum</th>
              <th>Poznámky</th>
              <th>Status</th>
              <th>Akcie</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr class="table-empty">
              <td colspan="9">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <p>Žiadne rezervácie</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Stats view (skrytá) -->
      <div class="stats-view hidden" id="statsView">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card-num" id="statTotal">0</div>
            <div class="stat-card-label">Celkom rezervácií</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-num" id="statPending">0</div>
            <div class="stat-card-label">Čakajúce</div>
          </div>
          <div class="stat-card accent">
            <div class="stat-card-num" id="statConfirmed">0</div>
            <div class="stat-card-label">Potvrdené</div>
          </div>
          <div class="stat-card muted">
            <div class="stat-card-num" id="statCancelled">0</div>
            <div class="stat-card-label">Zrušené</div>
          </div>
        </div>
        <div class="top-services">
          <h3>Najčastejšie služby</h3>
          <div id="servicesList"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay hidden" id="deleteModal">
    <div class="modal">
      <h3>Vymazať rezerváciu?</h3>
      <p>Táto akcia je nevratná.</p>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Zrušiť</button>
        <button class="modal-confirm" id="modalConfirm">Vymazať</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
